<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AILA Blueprint Visualizer</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#F0F4F8;color:#1E293B;padding:28px 20px;}

header{margin-bottom:20px;}
header h1{font-size:22px;font-weight:700;color:#0F172A;}
header p{font-size:13px;color:#64748B;margin-top:3px;}

.toolbar{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap;}
.filter-btn{padding:6px 16px;border-radius:20px;border:1.5px solid #CBD5E1;background:white;font-size:13px;font-weight:500;cursor:pointer;color:#475569;transition:all .15s;}
.filter-btn.active{background:#3B82F6;border-color:#3B82F6;color:white;}
.stats{font-size:13px;color:#64748B;margin-left:auto;}

.legend{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:22px;}
.legend-item{display:flex;align-items:center;gap:5px;font-size:12px;color:#475569;}
.legend-swatch{width:12px;height:12px;border-radius:3px;}

.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:20px;align-items:start;}
.card{background:white;border-radius:12px;padding:18px;box-shadow:0 1px 3px rgba(0,0,0,.06),0 4px 12px rgba(0,0,0,.05);cursor:pointer;transition:transform .12s,box-shadow .12s;}
.card:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.10);}
.card.spread{grid-column:span 2;}
@media(max-width:680px){.card.spread{grid-column:span 1;}}

.card-header{margin-bottom:10px;}
.card-type{display:inline-block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:2px 8px;border-radius:10px;margin-bottom:5px;}
.card-type.page{background:#EFF6FF;color:#1D4ED8;}
.card-type.spread{background:#F0FDF4;color:#15803D;}
.card-name{font-size:13px;font-weight:600;color:#0F172A;line-height:1.35;word-break:break-word;}

.notation{font-family:'SF Mono','Fira Code',monospace;font-size:10.5px;color:#334155;background:#F8FAFC;border:1px solid #E2E8F0;border-radius:5px;padding:6px 9px;margin-bottom:13px;overflow-x:auto;white-space:nowrap;}

.diagram{display:flex;justify-content:center;margin-bottom:13px;overflow-x:auto;}
.diagram svg{display:block;flex-shrink:0;}

.box-table{width:100%;border-collapse:collapse;font-size:11.5px;}
.box-table th{background:#F8FAFC;color:#64748B;font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.3px;padding:5px 8px;text-align:left;border-bottom:1px solid #E2E8F0;}
.box-table td{padding:5px 8px;border-bottom:1px solid #F1F5F9;color:#334155;vertical-align:middle;}
.box-table tr:last-child td{border-bottom:none;}
.box-table tr:hover td{background:#F8FAFC;}

.dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:4px;vertical-align:middle;}
.badge{display:inline-block;font-size:10px;font-weight:600;padding:1px 5px;border-radius:6px;margin-right:2px;vertical-align:middle;}
.badge-img{background:#E0E7FF;color:#4338CA;}
.badge-ad{background:#FEF3C7;color:#92400E;}

.hint{font-size:11px;color:#94A3B8;margin-top:8px;text-align:center;}
.hidden{display:none!important;}

/* ── Panel ──────────────────────────────────────────────────── */
#overlay{position:fixed;inset:0;background:rgba(15,23,42,.45);z-index:100;opacity:0;pointer-events:none;transition:opacity .2s;}
#overlay.open{opacity:1;pointer-events:all;}

#panel{position:fixed;top:0;right:0;width:min(900px,100vw);height:100vh;background:#F8FAFC;z-index:101;
  transform:translateX(100%);transition:transform .25s cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column;overflow:hidden;box-shadow:-8px 0 32px rgba(0,0,0,.15);}
#panel.open{transform:none;}

#panel-header{padding:20px 24px 16px;background:white;border-bottom:1px solid #E2E8F0;flex-shrink:0;display:flex;align-items:flex-start;gap:16px;}
#panel-header-text{flex:1;min-width:0;}
#panel-title{font-size:17px;font-weight:700;color:#0F172A;}
#panel-sub{font-size:12px;color:#64748B;margin-top:3px;}
#panel-close{width:32px;height:32px;border-radius:8px;border:none;background:#F1F5F9;cursor:pointer;font-size:18px;color:#475569;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .1s;}
#panel-close:hover{background:#E2E8F0;}

#panel-body{flex:1;overflow-y:auto;padding:20px 24px;}

.panel-diagram{display:flex;justify-content:flex-start;margin-bottom:20px;overflow-x:auto;}

.box-section{margin-bottom:28px;}
.box-section-header{display:flex;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #E2E8F0;}
.box-section-title{font-size:13px;font-weight:700;color:#0F172A;}
.box-section-meta{font-size:11px;color:#64748B;}
.box-type-chip{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;color:white;}
.fit-badge{font-size:9px;background:#FEF9C3;color:#92400E;padding:1px 5px;border-radius:6px;font-weight:600;}

.shapes-row{display:flex;flex-wrap:wrap;gap:10px;}

.shape-card{background:white;border-radius:8px;border:1.5px solid #E2E8F0;overflow:hidden;width:130px;flex-shrink:0;transition:border-color .1s,transform .1s;cursor:default;}
.shape-card:hover{border-color:#3B82F6;transform:translateY(-1px);}
.shape-thumb{width:130px;height:170px;object-fit:contain;background:#F8FAFC;display:block;border-bottom:1px solid #E2E8F0;}
.shape-thumb-placeholder{width:130px;height:170px;background:#F1F5F9;display:flex;align-items:center;justify-content:center;color:#94A3B8;font-size:11px;border-bottom:1px solid #E2E8F0;}
.shape-info{padding:6px 8px;}
.shape-name{font-size:9.5px;color:#475569;word-break:break-all;line-height:1.35;}
.shape-meta{font-size:10px;color:#94A3B8;margin-top:4px;font-family:monospace;line-height:1.8;}
.shape-meta span{display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.shape-meta .meta-label{color:#94A3B8;font-weight:600;}
.shape-meta .meta-val{color:#475569;}
.shape-meta .fold-line{color:#8B5CF6;}

.no-shapes{color:#94A3B8;font-size:12px;padding:12px 0;}

/* ── Shape size slider (panel) ──────────────────────────────── */
.size-control{display:flex;align-items:center;gap:8px;padding:10px 24px;background:white;border-bottom:1px solid #E2E8F0;flex-shrink:0;}
.size-control label{font-size:11px;color:#64748B;font-weight:600;white-space:nowrap;}
.size-control input[type=range]{flex:1;accent-color:#3B82F6;height:4px;cursor:pointer;}
.size-control .size-val{font-size:11px;color:#475569;font-weight:600;width:32px;text-align:right;}

/* ── Page nav tabs ──────────────────────────────────────────── */
/* ── Sticky topbar (nav + header + filters + legend) ──────────── */
#topbar{position:sticky;top:0;z-index:40;background:#F0F4F8;margin:-28px -20px 0;padding:28px 20px 14px;}
#topbar::after{content:"";position:absolute;left:0;right:0;bottom:0;height:14px;background:linear-gradient(#F0F4F8,rgba(240,244,248,0));pointer-events:none;transform:translateY(100%);}

.page-nav{display:flex;align-items:center;gap:4px;margin-bottom:24px;background:white;border-radius:12px;padding:5px;box-shadow:0 1px 3px rgba(0,0,0,.06),0 4px 12px rgba(0,0,0,.05);width:fit-content;}
.page-tab{padding:8px 20px;border-radius:8px;border:none;background:transparent;font-size:13px;font-weight:600;cursor:pointer;color:#64748B;transition:all .15s;}
.page-tab.active{background:#3B82F6;color:white;box-shadow:0 2px 8px rgba(59,130,246,.35);}
.page-tab:hover:not(.active){background:#F1F5F9;color:#334155;}

/* ── Shapes page ────────────────────────────────────────────── */
#page-shapes{display:none;}
#page-blueprints{display:block;}

.shapes-sort-bar{display:flex;align-items:center;gap:10px;margin-bottom:20px;flex-wrap:wrap;}
.sort-label{font-size:12px;font-weight:600;color:#64748B;}
.sort-btn{padding:5px 14px;border-radius:20px;border:1.5px solid #CBD5E1;background:white;font-size:12px;font-weight:500;cursor:pointer;color:#475569;transition:all .15s;display:flex;align-items:center;gap:5px;}
.sort-btn.active{background:#0F172A;border-color:#0F172A;color:white;}
.sort-btn .arrow{font-size:10px;opacity:.7;}
.shapes-stats{font-size:13px;color:#64748B;margin-left:auto;}

.type-group{margin-bottom:36px;}
.type-group-header{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding-bottom:10px;border-bottom:2px solid #E2E8F0;}
.type-group-label{font-size:15px;font-weight:700;color:#0F172A;}
.type-group-count{font-size:12px;color:#64748B;font-weight:500;}
.type-group-chip{display:inline-flex;align-items:center;padding:2px 10px;border-radius:10px;font-size:10px;font-weight:700;color:white;}

.shapes-grid{display:flex;flex-wrap:wrap;gap:12px;}

.spage-card{background:white;border-radius:8px;border:1.5px solid #E2E8F0;overflow:hidden;flex-shrink:0;transition:border-color .15s,transform .15s;cursor:default;}
.spage-card:hover{border-color:#3B82F6;transform:translateY(-1px);}
.spage-thumb{object-fit:contain;background:#F8FAFC;display:block;border-bottom:1px solid #E2E8F0;}
.spage-placeholder{background:#F1F5F9;display:flex;align-items:center;justify-content:center;color:#94A3B8;font-size:11px;border-bottom:1px solid #E2E8F0;}
.spage-info{padding:6px 8px;}
.spage-name{font-size:9.5px;color:#475569;word-break:break-all;line-height:1.35;}
.spage-meta{font-size:10px;color:#94A3B8;margin-top:4px;font-family:monospace;line-height:1.8;}
.spage-meta span{display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.spage-meta .ml{color:#94A3B8;font-weight:600;}
.spage-meta .mv{color:#475569;}
.spage-meta .fold{color:#8B5CF6;}

/* shapes page size slider */
.sp-size-bar{display:flex;align-items:center;gap:10px;margin-bottom:18px;}
.sp-size-bar label{font-size:12px;font-weight:600;color:#64748B;white-space:nowrap;}
.sp-size-bar input[type=range]{width:160px;accent-color:#3B82F6;cursor:pointer;}
.sp-size-bar .sp-val{font-size:12px;color:#475569;font-weight:600;width:36px;}

/* genre filter bar */
.genre-bar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:18px;padding:12px 16px;background:white;border-radius:10px;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.genre-bar-label{font-size:11px;font-weight:700;color:#94A3B8;text-transform:uppercase;letter-spacing:.5px;margin-right:4px;white-space:nowrap;}
.genre-btn{padding:5px 14px;border-radius:20px;border:1.5px solid #CBD5E1;background:white;font-size:12px;font-weight:500;cursor:pointer;color:#475569;transition:all .15s;display:flex;align-items:center;gap:6px;}
.genre-btn .gcnt{font-size:10px;background:#F1F5F9;color:#64748B;border-radius:10px;padding:1px 6px;font-weight:600;}
.genre-btn.active{background:#0F172A;border-color:#0F172A;color:white;}
.genre-btn.active .gcnt{background:rgba(255,255,255,.2);color:white;}
.genre-btn:hover:not(.active){background:#F8FAFC;border-color:#94A3B8;}
</style>
</head>
<body>

<div id="topbar">

<div class="page-nav">
  <button class="page-tab active" id="tab-blueprints" onclick="switchPage('blueprints')">Blueprint Overview</button>
  <button class="page-tab" id="tab-shapes" onclick="switchPage('shapes')">Shape Overview</button>
</div>

<div id="bp-topbar">

<header>
  <h1>AILA Blueprint Visualizer</h1>
  <p>Layout Automation Config &mdash; ADR NEW &mdash; Click a blueprint to browse matching shapes</p>
</header>

<div class="toolbar">
  <button class="filter-btn active" data-type="all" onclick="setBpType('all')">All</button>
  <button class="filter-btn" data-type="page" onclick="setBpType('page')">Pages only</button>
  <button class="filter-btn" data-type="spread" onclick="setBpType('spread')">Spreads only</button>
  <span class="stats" id="stats"></span>
</div>

<div class="genre-bar" id="bp-section-bar"></div>
<div class="legend" id="legend"></div>

</div><!-- #bp-topbar -->

<div id="sp-topbar" style="display:none;">

<header>
  <h1>Shape Overview</h1>
  <p>All shapes &mdash; ADR NEW &mdash; genres: column, info, info staand, kort, lees, lees staand, nieuws, nieuws staand</p>
</header>

<div style="margin-top:16px;" class="shapes-sort-bar" id="shapes-sort-bar">
  <span class="sort-label">Sort by</span>
  <button class="sort-btn active" id="sort-type" onclick="setSort('type')"><span>Type</span><span class="arrow" id="arr-type">↑</span></button>
  <button class="sort-btn" id="sort-bw" onclick="setSort('bw')"><span>Width</span><span class="arrow" id="arr-bw">↑</span></button>
  <button class="sort-btn" id="sort-bh" onclick="setSort('bh')"><span>Height</span><span class="arrow" id="arr-bh">↑</span></button>
  <button class="sort-btn" id="sort-chars" onclick="setSort('chars')"><span>Chars</span><span class="arrow" id="arr-chars">↑</span></button>
  <span class="shapes-stats" id="shapes-stats"></span>
</div>

<div class="sp-size-bar">
  <label>Shape size</label>
  <input type="range" id="sp-slider" min="80" max="240" value="130" step="10" oninput="resizeSpageCards(this.value)">
  <span class="sp-val" id="sp-val">130px</span>
</div>

<div class="genre-bar" id="genre-bar"></div>
<div class="genre-bar" id="sp-section-bar"></div>

</div><!-- #sp-topbar -->

</div><!-- #topbar -->

<div id="page-blueprints">
<div class="cards" id="cards"></div>
</div><!-- #page-blueprints -->

<div id="page-shapes" style="display:none;">
<div id="shapes-grid-root"></div>
</div><!-- #page-shapes -->

<div id="overlay" onclick="closePanel()"></div>
<div id="panel">
  <div id="panel-header">
    <div id="panel-header-text">
      <div id="panel-title"></div>
      <div id="panel-sub"></div>
    </div>
    <button id="panel-close" onclick="closePanel()">&#x2715;</button>
  </div>
  <div class="size-control">
    <label>Shape size</label>
    <input type="range" id="size-slider" min="80" max="220" value="130" step="10" oninput="resizeShapes(this.value)">
    <span class="size-val" id="size-val">130</span>
  </div>
  <div id="panel-body"></div>
</div>

var COLORS = {
  "\u00a71": {fill:"#3B82F6", label:"Article \u00a71", tid:"1"},
  "\u00a72": {fill:"#10B981", label:"Article \u00a72", tid:"2"},
  "\u00a73": {fill:"#F59E0B", label:"Article \u00a73", tid:"3"},
  "\u00a74": {fill:"#8B5CF6", label:"Article \u00a74", tid:"4"},
  "$":        {fill:"#F1F5F9", label:"Ad block",         tid:null},
  "#":        {fill:"#E0F2FE", label:"Image/special",    tid:null}
};

var TID_NAMES = {"1":"Lead", "2":"Secondary", "3":"Third", "4":"Filler"};

// \u2500\u2500 Parser \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
// Builds a tree that respects (A|B) = side-by-side and (A-B) = stacked,
// then flattens it into boxes with their actual col/row grid position.
function parseTree(str) {
  str = str.trim();
  var m = str.match(/^(\d+)x(\d+)\[(.+)\]$/);
  if (m) {
    return {type:'box', bw:+m[1], bh:+m[2], contents:parseContents(m[3])};
  }
  if (str[0] === '(') {
    var inner = str.slice(1, -1);
    var sp = findSplit(inner);
    if (sp) {
      return {
        type: sp.op === '|' ? 'hsplit' : 'vsplit',
        a: parseTree(inner.slice(0, sp.pos)),
        b: parseTree(inner.slice(sp.pos + 1))
      };
    }
    return parseTree(inner);
  }
  throw new Error('Cannot parse: ' + str);
}

function findSplit(str) {
  var depth = 0, inBracket = false, inBrace = false;
  for (var i = 0; i < str.length; i++) {
    var c = str[i];
    if (c === '(') depth++;
    else if (c === ')') depth--;
    else if (c === '[') inBracket = true;
    else if (c === ']') inBracket = false;
    else if (c === '{') inBrace = true;
    else if (c === '}') inBrace = false;
    else if (!inBracket && !inBrace && depth === 0) {
      if (c === '-') return {op:'-', pos:i};
      if (c === '|') return {op:'|', pos:i};
    }
  }
  return null;
}

function parseContents(s) {
  // Strip any trailing |{...} / -{...} layout-hint suffix before reading flags.
  var braceIdx = s.indexOf('{');
  if (braceIdx !== -1) {
    var sep = braceIdx > 0 ? s[braceIdx-1] : '';
    s = (sep === '|' || sep === '-') ? s.slice(0, braceIdx-1) : s.slice(0, braceIdx);
  }
  var hasImage = false, hasAd = false, customImgCols = null;
  // A box can reference more than one article type, e.g. "\u00a71\u00a72" \u2014 collect them all.
  var tids = [];
  var m, re = /\u00a7(\d+)/g;
  while ((m = re.exec(s)) !== null) {
    if (tids.indexOf(m[1]) === -1) tids.push(m[1]);
  }
  var tid = tids.length ? tids[0] : null; // kept for backward-compatible single-color use
  if (s.includes('#')) hasImage = true;
  if (s.includes('$')) hasAd = true;
  var colM = s.match(/\u00a7\d+\/(\d+)/);
  if (colM) customImgCols = +colM[1];
  return {tid, tids, hasImage, hasAd, customImgCols};
}

function getSize(node) {
  if (node.type === 'box') return {w:node.bw, h:node.bh};
  var sa = getSize(node.a), sb = getSize(node.b);
  if (node.type === 'hsplit') return {w:sa.w+sb.w, h:Math.max(sa.h,sb.h)};
  return {w:Math.max(sa.w,sb.w), h:sa.h+sb.h};
}

function collectBoxes(node, col, row, boxes) {
  boxes = boxes || [];
  if (node.type === 'box') {
    boxes.push({col:col, row:row, bw:node.bw, bh:node.bh, contents:node.contents});
    return boxes;
  }
  var sa = getSize(node.a);
  collectBoxes(node.a, col, row, boxes);
  if (node.type === 'hsplit') collectBoxes(node.b, col+sa.w, row, boxes);
  else                        collectBoxes(node.b, col, row+sa.h, boxes);
  return boxes;
}

function parse(str) {
  var tree = parseTree(str);
  return collectBoxes(tree, 0, 0);
}

// \u2500\u2500 SVG renderer \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
function renderSVG(bp) {
  var boxes = parse(bp.definition);
  var CELL=28, PAD=6, GAP=2;
  var totalW = bp.width, totalH = bp.height;
  var svgW = totalW*CELL + (totalW-1)*GAP + PAD*2;
  var svgH = totalH*CELL + (totalH-1)*GAP + PAD*2;
  var svg = '<svg width="'+svgW+'" height="'+svgH+'" viewBox="0 0 '+svgW+' '+svgH+'" xmlns="http://www.w3.org/2000/svg">';
  svg += '<rect width="'+svgW+'" height="'+svgH+'" rx="4" fill="#F8FAFC"/>';
  boxes.forEach(function(box) {
    var x = PAD + box.col*(CELL+GAP);
    var y = PAD + box.row*(CELL+GAP);
    var w = box.bw*CELL + (box.bw-1)*GAP;
    var h = box.bh*CELL + (box.bh-1)*GAP;
    var key = box.contents.tid ? '\u00a7'+box.contents.tid : (box.contents.hasAd?'$':'#');
    var col = COLORS[key] || {fill:'#E2E8F0'};
    svg += '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" rx="3" fill="'+col.fill+'" opacity="0.85"/>';
    var lp = [];
    box.contents.tids.forEach(function(t) { lp.push('\u00a7'+t); });
    if (box.contents.hasImage) lp.push('#');
    if (box.contents.hasAd)   lp.push('$');
    var label = lp.join(' ');
    var fs = Math.min(10, w*0.28);
    svg += '<text x="'+(x+w/2)+'" y="'+(y+h/2+fs*0.35)+'" text-anchor="middle" font-family="system-ui,sans-serif" font-size="'+fs+'" font-weight="700" fill="white" opacity="0.9">'+label+'</text>';
  });
  svg += '</svg>';
  return svg;
}

// \u2500\u2500 Panel \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
function openPanel(idx) {
  var bp = BLUEPRINTS[idx];
  var boxes = parse(bp.definition);
  document.getElementById('panel-title').textContent = bp.name;
  document.getElementById('panel-sub').textContent   = bp.type+' \u2022 '+bp.definition;
  var body = document.getElementById('panel-body');
  body.innerHTML = '';
  var diag = document.createElement('div'); diag.className='panel-diagram';
  diag.innerHTML = renderSVG(bp); body.appendChild(diag);
  boxes.forEach(function(box) {
    var tids = box.contents.tids || [];
    // A box can carry more than one article type (e.g. "\u00a71\u00a72"); match shapes
    // against ANY of them, unioned, so no valid shape type gets left out.
    var matches = SHAPES.filter(function(s) {
      return tids.indexOf(s.tid) !== -1 && s.bw===box.bw && s.bh===box.bh;
    });
    var sec = document.createElement('div'); sec.className='box-section';
    var hdr = document.createElement('div'); hdr.className='box-section-header';

    var chips = tids.map(function(t) {
      var c = COLORS['\u00a7'+t];
      var name = TID_NAMES[t] || ('Type '+t);
      return '<span class="box-type-chip" style="background:'+(c?c.fill:'#64748B')+'">\u00a7'+t+' '+name+'</span>';
    });
    if (box.contents.hasImage) chips.push('<span class="box-type-chip" style="background:'+COLORS['#'].fill+';color:#0F172A;">#\u00a0Special</span>');
    if (box.contents.hasAd)   chips.push('<span class="box-type-chip" style="background:'+COLORS['$'].fill+';color:#0F172A;">$\u00a0Advert</span>');
    if (!chips.length) chips.push('<span class="box-type-chip" style="background:#64748B;">Untyped</span>');

    hdr.innerHTML = chips.join('')
      +'<span class="box-section-title">'+box.bw+'\u00d7'+box.bh+' blocks</span>'
      +'<span class="box-section-meta">'+matches.length+' matching shape'+(matches.length!==1?'s':'')+'</span>';
    sec.appendChild(hdr);

    if (!tids.length) {
      var nm=document.createElement('div'); nm.className='no-shapes';
      nm.textContent = (box.contents.hasImage||box.contents.hasAd)
        ? 'Special/advert blocks are not linked to shape assets \u2014 no shapes to match.'
        : 'No article type on this block \u2014 no shapes to match.';
      sec.appendChild(nm);
    } else if (!matches.length) {
      var nm=document.createElement('div'); nm.className='no-shapes'; nm.textContent='No shapes match this block.'; sec.appendChild(nm);
    } else {
      var row=document.createElement('div'); row.className='shapes-row';
      matches.forEach(function(s) {
        var curPx = +document.getElementById('size-slider').value;
        var curThumbH = Math.round(curPx*1.307);
        var sc=document.createElement('div'); sc.className='shape-card'; sc.style.width=curPx+'px';
        var imgEl=document.createElement('img'); imgEl.className='shape-thumb';
        imgEl.style.width=curPx+'px'; imgEl.style.height=curThumbH+'px';
        imgEl.src=s.jpg; imgEl.alt=s.name;
        imgEl.onerror=function(){
          this.style.display='none';
          var ph=document.createElement('div'); ph.className='shape-thumb-placeholder';
          ph.style.width=curPx+'px'; ph.style.height=curThumbH+'px';
          ph.textContent='No preview';
          this.parentNode.insertBefore(ph,this);
        };
        var parts=s.name.split('_'); var shortName=parts.slice(-3).join('_');
        var foldStr=(s.foldLine!==null&&s.foldLine!==undefined)?Math.round(s.foldLine)+' pt':'\u2014';
        var charsStr=(s.tekstChars!==null&&s.tekstChars!==undefined)?s.tekstChars+' chars':'\u2014';
        var genreStr=s.genreId||'\u2014';
        var sectionStr=s.section||'\u2014';
        var imagesStr=(s.imageCount!==null&&s.imageCount!==undefined)?s.imageCount:'\u2014';
        var quotesStr=(s.quoteCount!==null&&s.quoteCount!==undefined)?s.quoteCount:'\u2014';
        var typeStr=TID_NAMES[s.tid]||s.typeName||('Type '+s.tid);
        var info=document.createElement('div'); info.className='shape-info';
        info.innerHTML='<div class="shape-name" title="'+escHtml(s.name)+'">'+escHtml(shortName)+'</div>'
          +'<div class="shape-meta">'
            +(tids.length>1?'<span><span class="meta-label">Type </span><span class="meta-val">'+escHtml(typeStr)+'</span></span>':'')
            +'<span><span class="meta-label">Tekst </span><span class="meta-val">'+charsStr+'</span></span>'
            +'<span><span class="meta-label">Genre </span><span class="meta-val">'+escHtml(genreStr)+'</span></span>'
            +'<span><span class="meta-label">Section </span><span class="meta-val">'+escHtml(sectionStr)+'</span></span>'
            +'<span><span class="meta-label">Images </span><span class="meta-val">'+imagesStr+'</span></span>'
            +'<span><span class="meta-label">Quotes </span><span class="meta-val">'+quotesStr+'</span></span>'
            +'<span class="fold-line"><span class="meta-label">Fold </span><span class="meta-val">'+foldStr+'</span></span>'
          +'</div>';
        sc.appendChild(imgEl); sc.appendChild(info); row.appendChild(sc);
      });
      sec.appendChild(row);
    }
    body.appendChild(sec);
  });
  document.getElementById('overlay').classList.add('open');
  document.getElementById('panel').classList.add('open');
}

function resizeShapes(px) {
  px = +px;
  document.getElementById('size-val').textContent = px;
  var thumbH = Math.round(px*1.307);
  document.querySelectorAll('.shape-card').forEach(function(c){ c.style.width=px+'px'; });
  document.querySelectorAll('.shape-thumb,.shape-thumb-placeholder').forEach(function(el){
    el.style.width=px+'px'; el.style.height=thumbH+'px';
  });
}

function closePanel() {
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('panel').classList.remove('open');
}

// \u2500\u2500 Blueprint card \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
function renderCard(bp,idx) {
  var svg=renderSVG(bp);
  var boxes=parse(bp.definition);
  var tableRows=boxes.map(function(box,i){
    var lp=[];
    (box.contents.tids||[]).forEach(function(t){ lp.push('\u00a7'+t); });
    if(box.contents.hasImage) lp.push('<span class="badge badge-img">#</span>');
    if(box.contents.hasAd)   lp.push('<span class="badge badge-ad">$</span>');
    return '<tr><td>'+(i+1)+'</td><td>col '+(box.col+1)+', row '+(box.row+1)+'</td><td>'+box.bw+'\u00d7'+box.bh+'</td><td>'+lp.join('')+'</td></tr>';
  }).join('');
  var div=document.createElement('div');
  div.className='card'+(bp.type==='spread'?' spread':'');
  div.dataset.type=bp.type; div.dataset.idx=idx;
  div.dataset.sections=(bp.sections||[]).join('|');
  div.addEventListener('click',function(){openPanel(+this.dataset.idx);});
  div.innerHTML=
    '<div class="card-header">'
      +'<div class="card-type '+bp.type+'">'+(bp.type==='spread'?'Spread '+bp.width+'\u00d7'+bp.height:'Page '+bp.width+'\u00d7'+bp.height)+'</div>'
      +'<div class="card-name">'+escHtml(bp.name)+'</div>'
    +'</div>'
    +'<div class="notation">'+escHtml(bp.definition)+'</div>'
    +'<div class="diagram">'+svg+'</div>'
    +'<table class="box-table">'
      +'<thead><tr><th>Box</th><th>Position</th><th>Size</th><th>Contents</th></tr></thead>'
      +'<tbody>'+tableRows+'</tbody>'
    +'</table>'
    +'<div class="hint">Click to browse matching shapes</div>';
  return div;
}

function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

var activeBpType = 'all';
var activeBpSection = 'all';

function setBpType(type) {
  activeBpType = type;
  document.querySelectorAll('.toolbar .filter-btn').forEach(function(b){
    b.classList.toggle('active', b.dataset.type===type);
  });
  applyBpFilters();
}

function setBpSection(section) {
  activeBpSection = section;
  document.querySelectorAll('#bp-section-bar .genre-btn').forEach(function(b){
    b.classList.toggle('active', b.dataset.section===section);
  });
  applyBpFilters();
}

function applyBpFilters() {
  var vis=0;
  document.querySelectorAll('#cards .card').forEach(function(c){
    var typeOk = (activeBpType==='all' || c.dataset.type===activeBpType);
    var secs = (c.dataset.sections||'').split('|').filter(Boolean);
    var sectionOk = (activeBpSection==='all')
      || secs.indexOf(activeBpSection)!==-1
      || (activeBpSection==='\u2014' && secs.length===0);
    var show = typeOk && sectionOk;
    c.classList.toggle('hidden',!show); if(show) vis++;
  });
  document.getElementById('stats').textContent=vis+' blueprints';
}

function getBpSectionCounts() {
  var counts={};
  BLUEPRINTS.forEach(function(bp){
    var secs=(bp.sections&&bp.sections.length)?bp.sections:['\u2014'];
    secs.forEach(function(s){ counts[s]=(counts[s]||0)+1; });
  });
  return counts;
}

function buildBpSectionBar() {
  var bar=document.getElementById('bp-section-bar');
  var counts=getBpSectionCounts();
  var keys=Object.keys(counts).sort();
  if (!keys.length) { bar.style.display='none'; return; }
  bar.innerHTML='<span class="genre-bar-label">Section</span>';
  var allBtn=document.createElement('button');
  allBtn.className='genre-btn active'; allBtn.dataset.section='all';
  allBtn.innerHTML='All <span class="gcnt">'+BLUEPRINTS.length+'</span>';
  allBtn.onclick=function(){setBpSection('all');};
  bar.appendChild(allBtn);
  keys.forEach(function(k){
    var btn=document.createElement('button');
    btn.className='genre-btn'; btn.dataset.section=k;
    btn.innerHTML=escHtml(k)+' <span class="gcnt">'+counts[k]+'</span>';
    btn.onclick=function(){setBpSection(k);};
    bar.appendChild(btn);
  });
}

function renderLegend() {
  var el=document.getElementById('legend');
  Object.keys(COLORS).forEach(function(k){
    var d=document.createElement('div'); d.className='legend-item';
    d.innerHTML='<div class="legend-swatch" style="background:'+COLORS[k].fill+'"></div>'+COLORS[k].label;
    el.appendChild(d);
  });
}

renderLegend();
buildBpSectionBar();
var cardsEl=document.getElementById('cards');
var renderErrors=[];
BLUEPRINTS.forEach(function(bp,i){
  try {
    cardsEl.appendChild(renderCard(bp,i));
  } catch(e) {
    renderErrors.push({name:bp.name, err:e.message});
    console.error('Failed to render blueprint "'+bp.name+'":', e);
    var errCard=document.createElement('div');
    errCard.className='card';
    errCard.style.borderColor='#EF4444';
    errCard.innerHTML='<div class="card-header"><div class="card-type page" style="background:#FEE2E2;color:#B91C1C;">Parse error</div>'
      +'<div class="card-name">'+bp.name.replace(/</g,"&lt;")+'</div></div>'
      +'<div class="notation" style="color:#B91C1C;">'+e.message.replace(/</g,"&lt;")+'</div>';
    cardsEl.appendChild(errCard);
  }
});
document.getElementById('stats').textContent=BLUEPRINTS.length+' blueprints'+(renderErrors.length?' ('+renderErrors.length+' failed to render \u2014 see console)':'');
if (renderErrors.length) console.warn('Blueprints that failed to render:', renderErrors);

// \u2500\u2500 Page switching \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
var shapesPageBuilt = false;

function switchPage(page) {
  var bp=document.getElementById('page-blueprints');
  var sp=document.getElementById('page-shapes');
  var bpTop=document.getElementById('bp-topbar');
  var spTop=document.getElementById('sp-topbar');
  var tBp=document.getElementById('tab-blueprints');
  var tSp=document.getElementById('tab-shapes');
  if (page==='shapes') {
    bp.style.display='none'; sp.style.display='block';
    bpTop.style.display='none'; spTop.style.display='block';
    tBp.classList.remove('active'); tSp.classList.add('active');
    if (!shapesPageBuilt) { buildShapesPage(); shapesPageBuilt=true; }
  } else {
    sp.style.display='none'; bp.style.display='block';
    spTop.style.display='none'; bpTop.style.display='block';
    tSp.classList.remove('active'); tBp.classList.add('active');
  }
  window.scrollTo(0,0);
}

// \u2500\u2500 Shapes page \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
var TYPE_ORDER  = {lead:0,secondary:1,third:2,filler:3};
var TYPE_COLORS = {lead:'#3B82F6',secondary:'#10B981',third:'#F59E0B',filler:'#8B5CF6'};
var currentSort = {key:'type',asc:true};
var activeGenre = 'all';
var activeSpSection = 'all';

function getGenreCounts() {
  var counts={};
  SHAPES.forEach(function(s){ var g=s.genreId||'\u2014'; counts[g]=(counts[g]||0)+1; });
  return counts;
}

function buildGenreBar() {
  var bar=document.getElementById('genre-bar');
  bar.innerHTML='<span class="genre-bar-label">Genre</span>';
  var counts=getGenreCounts();
  var total=SHAPES.length;
  var allBtn=document.createElement('button');
  allBtn.className='genre-btn active'; allBtn.dataset.genre='all';
  allBtn.innerHTML='All <span class="gcnt">'+total+'</span>';
  allBtn.onclick=function(){setGenre('all');};
  bar.appendChild(allBtn);
  Object.keys(counts).sort().forEach(function(g){
    var btn=document.createElement('button');
    btn.className='genre-btn'; btn.dataset.genre=g;
    btn.innerHTML=escHtml(g)+' <span class="gcnt">'+counts[g]+'</span>';
    btn.onclick=function(){setGenre(g);};
    bar.appendChild(btn);
  });
}

function setGenre(genre) {
  activeGenre=genre;
  document.querySelectorAll('#genre-bar .genre-btn').forEach(function(b){
    b.classList.toggle('active',b.dataset.genre===genre);
  });
  renderShapesGrid();
}

function getSpSectionCounts() {
  var counts={};
  SHAPES.forEach(function(s){ var sec=s.section||'\u2014'; counts[sec]=(counts[sec]||0)+1; });
  return counts;
}

function buildSpSectionBar() {
  var bar=document.getElementById('sp-section-bar');
  bar.innerHTML='<span class="genre-bar-label">Section</span>';
  var counts=getSpSectionCounts();
  var total=SHAPES.length;
  var allBtn=document.createElement('button');
  allBtn.className='genre-btn active'; allBtn.dataset.section='all';
  allBtn.innerHTML='All <span class="gcnt">'+total+'</span>';
  allBtn.onclick=function(){setSpSection('all');};
  bar.appendChild(allBtn);
  Object.keys(counts).sort().forEach(function(k){
    var btn=document.createElement('button');
    btn.className='genre-btn'; btn.dataset.section=k;
    btn.innerHTML=escHtml(k)+' <span class="gcnt">'+counts[k]+'</span>';
    btn.onclick=function(){setSpSection(k);};
    bar.appendChild(btn);
  });
}

function setSpSection(section) {
  activeSpSection=section;
  document.querySelectorAll('#sp-section-bar .genre-btn').forEach(function(b){
    b.classList.toggle('active',b.dataset.section===section);
  });
  renderShapesGrid();
}

function filteredShapes() {
  return SHAPES.filter(function(s){
    var genreOk = (activeGenre==='all') || (s.genreId||'\u2014')===activeGenre;
    var sectionOk = (activeSpSection==='all') || (s.section||'\u2014')===activeSpSection;
    return genreOk && sectionOk;
  });
}

function sortShapes(shapes,key,asc) {
  var typeRank=function(s){return TYPE_ORDER[s.typeName]!==undefined?TYPE_ORDER[s.typeName]:99;};
  return shapes.slice().sort(function(a,b){
    var va,vb;
    if (key==='type')       {va=typeRank(a);vb=typeRank(b);}
    else if (key==='bw')    {va=a.bw;vb=b.bw;}
    else if (key==='bh')    {va=a.bh;vb=b.bh;}
    else if (key==='chars') {va=a.tekstChars||0;vb=b.tekstChars||0;}
    else                    {va=typeRank(a);vb=typeRank(b);}
    if (va!==vb) return asc?va-vb:vb-va;
    if (typeRank(a)!==typeRank(b)) return typeRank(a)-typeRank(b);
    if (a.bw!==b.bw) return a.bw-b.bw;
    if (a.bh!==b.bh) return a.bh-b.bh;
    return (a.tekstChars||0)-(b.tekstChars||0);
  });
}

function groupShapes(shapes) {
  if (currentSort.key==='type') {
    var groups={},order=[];
    shapes.forEach(function(s){
      if (!groups[s.typeName]){groups[s.typeName]=[];order.push(s.typeName);}
      groups[s.typeName].push(s);
    });
    return order.map(function(k){return{label:k,shapes:groups[k]};  });
  }
  return [{label:null,shapes:shapes}];
}

function spCardHtml(s,px) {
  var thumbH=Math.round(px*1.307);
  var parts=s.name.split('_'); var shortName=parts.slice(-3).join('_');
  var foldStr=(s.foldLine!==null&&s.foldLine!==undefined)?Math.round(s.foldLine)+' pt':'\u2014';
  var charsStr=(s.tekstChars!==null&&s.tekstChars!==undefined)?s.tekstChars+' chars':'\u2014';
  var sectionStr=s.section||'\u2014';
  var imagesStr=(s.imageCount!==null&&s.imageCount!==undefined)?s.imageCount:'\u2014';
  var quotesStr=(s.quoteCount!==null&&s.quoteCount!==undefined)?s.quoteCount:'\u2014';
  var card=document.createElement('div'); card.className='spage-card'; card.style.width=px+'px';
  var img=document.createElement('img'); img.className='spage-thumb';
  img.src=s.jpg; img.alt=s.name;
  img.style.width=px+'px'; img.style.height=thumbH+'px'; img.title=s.name;
  img.onerror=function(){
    this.style.display='none';
    var ph=document.createElement('div'); ph.className='spage-placeholder';
    ph.style.width=px+'px'; ph.style.height=thumbH+'px'; ph.textContent='No preview';
    this.parentNode.insertBefore(ph,this);
  };
  var info=document.createElement('div'); info.className='spage-info';
  info.innerHTML='<div class="spage-name" title="'+escHtml(s.name)+'">'+escHtml(shortName)+'</div>'
    +'<div class="spage-meta">'
      +'<span><span class="ml">Size\u00a0</span><span class="mv">'+s.bw+'\u00d7'+s.bh+' blk \u00a7'+s.tid+'</span></span>'
      +'<span><span class="ml">Tekst\u00a0</span><span class="mv">'+charsStr+'</span></span>'
      +'<span><span class="ml">Section\u00a0</span><span class="mv">'+escHtml(sectionStr)+'</span></span>'
      +'<span><span class="ml">Images\u00a0</span><span class="mv">'+imagesStr+'</span></span>'
      +'<span><span class="ml">Quotes\u00a0</span><span class="mv">'+quotesStr+'</span></span>'
      +'<span class="fold"><span class="ml">Fold\u00a0</span><span class="mv">'+foldStr+'</span></span>'
    +'</div>';
  card.appendChild(img); card.appendChild(info);
  return card;
}

function buildShapesPage() {
  buildGenreBar();
  buildSpSectionBar();
  renderShapesGrid();
  document.getElementById('shapes-stats').textContent=SHAPES.length+' shapes';
}

function renderShapesGrid() {
  var px=+document.getElementById('sp-slider').value;
  var source=filteredShapes();
  var sorted=sortShapes(source,currentSort.key,currentSort.asc);
  var groups=groupShapes(sorted);
  var root=document.getElementById('shapes-grid-root');
  root.innerHTML='';
  groups.forEach(function(g){
    var section=document.createElement('div'); section.className='type-group';
    if (g.label) {
      var col=TYPE_COLORS[g.label]||'#64748B';
      var header=document.createElement('div'); header.className='type-group-header';
      header.innerHTML='<span class="type-group-chip" style="background:'+col+'">'+escHtml(g.label)+'</span>'
        +'<span class="type-group-label">'+escHtml(g.label.charAt(0).toUpperCase()+g.label.slice(1))+'</span>'
        +'<span class="type-group-count">'+g.shapes.length+' shape'+(g.shapes.length!==1?'s':'')+'</span>';
      section.appendChild(header);
    }
    var grid=document.createElement('div'); grid.className='shapes-grid';
    g.shapes.forEach(function(s){grid.appendChild(spCardHtml(s,px));});
    section.appendChild(grid);
    root.appendChild(section);
  });
}

function setSort(key) {
  if (currentSort.key===key) {currentSort.asc=!currentSort.asc;}
  else {currentSort.key=key;currentSort.asc=true;}
  ['type','bw','bh','chars'].forEach(function(k){
    var btn=document.getElementById('sort-'+k);
    var arr=document.getElementById('arr-'+k);
    var active=(currentSort.key===k);
    btn.classList.toggle('active',active);
    arr.textContent=active?(currentSort.asc?'\u2191':'\u2193'):'\u2191';
  });
  if (shapesPageBuilt) renderShapesGrid();
}

function resizeSpageCards(px) {
  px=+px;
  document.getElementById('sp-val').textContent=px+'px';
  var thumbH=Math.round(px*1.307);
  document.querySelectorAll('.spage-card').forEach(function(c){c.style.width=px+'px';});
  document.querySelectorAll('.spage-thumb,.spage-placeholder').forEach(function(el){
    el.style.width=px+'px'; el.style.height=thumbH+'px';
  });
}
</script>
