<svg xmlns="http://www.w3.org/2000/svg" width="487.874" height="304.012" viewBox="1133.701 852.85 487.874 304.012">
<style>
    .page { fill: #fff; stroke: #ccc; }
    .margin { fill: none; stroke: #aaa; stroke-dasharray: 4 2; }
    .column { fill: none; stroke: #ddd; }
    .grid { stroke: #eee; stroke-width: 0.5; }

    .text-frame { fill: rgba(0,0,255,0.08); stroke: #00f; }
    .image-frame { fill: rgba(255,165,0,0.15); stroke: #f90; }

    .frame-id { 
        font-size: 7px; 
        fill: #666;
    }
    
    .thread {
        fill: none;
        stroke: #888;
        stroke-dasharray: 3 3;
        stroke-width: 1;
    }

    .label {
        font-size: 9px;
        font-family: monospace;
    }

    .snippet {
        font-size: 12px;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        fill: #111;
    }

    .label-bg {
        fill: #000;
        opacity: 0.75;
    }

    .label-inv {
        fill: #fff;
        text-anchor: end;
    }

    .z-index { 
        font-size: 7px; 
        fill: #333;
        text-anchor: end;
        paint-order: stroke fill;
        stroke: white;
        stroke-width: 2;
        stroke-linejoin: round;
    }

    .distance {
        stroke: red;
        stroke-width: 2.5;
        fill: none;
    }

    .edge-ghost {
        stroke: rgba(200, 0, 0, 0.4);
        stroke-width: 1.5;
        stroke-dasharray: 6 3;
        fill: none;
    }

    .arrowhead {
        fill: red;
    }
    
    .fender-zone {
        fill: url(#fender-hatch);
        stroke: none;
    }

    .fender-edge {
        stroke: #0891b2;
        stroke-width: 2;
        fill: none;
    }
</style>
<defs>
    <pattern id="baseline-grid" patternUnits="userSpaceOnUse" width="100%" height="11">
        <line x1="0" y1="0" x2="100%" y2="0" class="grid" />
    </pattern>
    <pattern id="checkerboard" patternUnits="userSpaceOnUse" width="20" height="20">
        <rect width="20" height="20" fill="#e8e8e8" stroke="none"/>
        <rect width="10" height="10" fill="#ffffff" stroke="none"/>
        <rect x="10" y="10" width="10" height="10" fill="#ffffff" stroke="none"/>
    </pattern>
    <pattern id="fender-hatch" patternUnits="userSpaceOnUse" width="8" height="8" patternTransform="rotate(45)">
        <line x1="0" y1="0" x2="0" y2="8" stroke="#0891b2" stroke-width="1.2" stroke-opacity="0.5" />
    </pattern>
</defs>


<g id="article">

<rect class="text-frame" x="1165.039" y="902.011" width="33.823" height="14.851" />
<rect class="label-bg" x="1154.862" y="902.862" width="44" height="14" />
<text class="z-index" x="1150.862" y="912.862" text-anchor="end">z:41</text>
<text class="label label-inv" x="1194.862" y="912.862">PLAATS</text>
<rect class="text-frame" x="1165.039" y="912.712" width="138.144" height="15.15" />
<rect class="label-bg" x="1253.183" y="913.862" width="50" height="14" />
<text class="z-index" x="1249.183" y="923.862" text-anchor="end">z:42</text>
<text class="label label-inv" x="1299.183" y="923.862">SPECIAL</text>
<rect class="image-frame" x="1314.2350000000001" y="905.8620000000001" width="287.34" height="231" />
<rect class="label-bg" x="1563.575" y="1122.862" width="38" height="14" />
<text class="z-index" x="1559.575" y="1132.862" text-anchor="end">z:43</text>
<text class="label label-inv" x="1597.575" y="1132.862">image</text>
<rect class="text-frame" x="1165.039" y="872.862" width="436.535" height="33" />
<rect class="label-bg" x="1575.574" y="891.862" width="26" height="14" />
<text class="z-index" x="1571.574" y="901.862" text-anchor="end">z:44</text>
<text class="label label-inv" x="1597.574" y="901.862">KOP</text>
<rect class="text-frame" x="1165.039" y="938.8620000000001" width="138.144" height="198" />
<rect class="label-bg" x="1265.183" y="1122.862" width="38" height="14" />
<text class="z-index" x="1261.183" y="1132.862" text-anchor="end">z:45</text>
<text class="label label-inv" x="1299.183" y="1132.862">TEKST</text>
</g>
</svg>