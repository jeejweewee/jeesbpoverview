<rect class="label-bg" x="140.582" y="828.74" width="38" height="14" />
<text class="z-index" x="136.582" y="838.74" text-anchor="end">z:496</text>
<text class="label label-inv" x="174.582" y="838.74">TEKST</text>
<rect class="text-frame" x="37.003" y="309" width="141.579" height="16.783" />
<rect class="label-bg" x="134.582" y="311.783" width="44" height="14" />
<text class="z-index" x="130.582" y="321.783" text-anchor="end">z:498</text>
<text class="label label-inv" x="174.582" y="321.783">PLAATS</text>
<rect class="text-frame" x="36.85" y="290" width="141.732" height="29.087" />
<rect class="label-bg" x="134.582" y="305.087" width="44" height="14" />
<text class="z-index" x="130.582" y="315.087" text-anchor="end">z:500</text>
<text class="label label-inv" x="174.582" y="315.087">AUTEUR</text>
<rect class="text-frame" x="36.85" y="213" width="141.656" height="76.85" />
<rect class="label-bg" x="140.506" y="275.85" width="38" height="14" />
<text class="z-index" x="136.506" y="285.85" text-anchor="end">z:502</text>
<text class="label label-inv" x="174.506" y="285.85">INTRO</text>
</g>
</svg>