<rect class="label-bg" x="945.1379999999999" y="305.087" width="44" height="14" />
<text class="z-index" x="941.1379999999999" y="315.087" text-anchor="end">z:513</text>
<text class="label label-inv" x="985.1379999999999" y="315.087">AUTEUR</text>
