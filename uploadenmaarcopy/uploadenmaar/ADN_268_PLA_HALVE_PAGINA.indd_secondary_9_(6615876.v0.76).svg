<rect class="label-bg" x="1563.499" y="231.85" width="38" height="14" />
<text class="z-index" x="1559.499" y="241.85" text-anchor="end">z:419</text>
<text class="label label-inv" x="1597.499" y="241.85">INTRO</text>
</g>
</svg>