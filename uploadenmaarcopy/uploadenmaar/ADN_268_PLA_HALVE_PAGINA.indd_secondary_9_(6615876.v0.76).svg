<rect class="label-bg" x="1563.575" y="561.937" width="38" height="14" />
<text class="z-index" x="1559.575" y="571.937" text-anchor="end">z:416</text>
<text class="label label-inv" x="1597.575" y="571.937">TEKST</text>
<rect class="text-frame" x="1459.996" y="249.884" width="141.579" height="31.9" />
<rect class="label-bg" x="1557.575" y="267.784" width="44" height="14" />
<text class="z-index" x="1553.575" y="277.784" text-anchor="end">z:417</text>
<text class="label label-inv" x="1597.575" y="277.784">PLAATS</text>
<rect class="text-frame" x="1459.843" y="230.884" width="141.732" height="44.204" />
<rect class="label-bg" x="1557.575" y="261.08799999999997" width="44" height="14" />
<text class="z-index" x="1553.575" y="271.08799999999997" text-anchor="end">z:418</text>
<text class="label label-inv" x="1597.575" y="271.08799999999997">AUTEUR</text>
