<svg xmlns="http://www.w3.org/2000/svg" width="181.732" height="309.512" viewBox="1439.843 852.85 181.732 309.512">
<style>
    .page { fill: #fff; stroke: #ccc; }
    .margin { fill: none; stroke: #aaa; stroke-dasharray: 4 2; }
    .column { fill: none; stroke: #ddd; }
    .grid { stroke: #eee; stroke-width: 0.5; }

    .text-frame { fill: rgba(0,0,255,0.08); stroke: #00f; }
    .image-frame { fill: rgba(255,165,0,0.15); stroke: #f90; }

    .frame-id { 
        font-size: 7px; 
        fill: #666;
    }
    
    .thread {
        fill: none;
        stroke: #888;
        stroke-dasharray: 3 3;
        stroke-width: 1;
    }

    .label {
        font-size: 9px;
        font-family: monospace;
    }

    .snippet {
        font-size: 12px;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        fill: #111;
    }

    .label-bg {
        fill: #000;
        opacity: 0.75;
    }

    .label-inv {
        fill: #fff;
        text-anchor: end;
    }

    .z-index { 
        font-size: 7px; 
        fill: #333;
        text-anchor: end;
        paint-order: stroke fill;
        stroke: white;
        stroke-width: 2;
        stroke-linejoin: round;
    }

    .distance {
        stroke: red;
        stroke-width: 2.5;
        fill: none;
    }

    .edge-ghost {
        stroke: rgba(200, 0, 0, 0.4);
        stroke-width: 1.5;
        stroke-dasharray: 6 3;
        fill: none;
    }

    .arrowhead {
        fill: red;
    }
    
    .fender-zone {
        fill: url(#fender-hatch);
        stroke: none;
    }

    .fender-edge {
        stroke: #0891b2;
        stroke-width: 2;
        fill: none;
    }
</style>
<defs>
    <pattern id="baseline-grid" patternUnits="userSpaceOnUse" width="100%" height="11">
        <line x1="0" y1="0" x2="100%" y2="0" class="grid" />
    </pattern>
    <pattern id="checkerboard" patternUnits="userSpaceOnUse" width="20" height="20">
        <rect width="20" height="20" fill="#e8e8e8" stroke="none"/>
        <rect width="10" height="10" fill="#ffffff" stroke="none"/>
        <rect x="10" y="10" width="10" height="10" fill="#ffffff" stroke="none"/>
    </pattern>
    <pattern id="fender-hatch" patternUnits="userSpaceOnUse" width="8" height="8" patternTransform="rotate(45)">
        <line x1="0" y1="0" x2="0" y2="8" stroke="#0891b2" stroke-width="1.2" stroke-opacity="0.5" />
    </pattern>
</defs>


<g id="article">

<rect class="text-frame" x="1459.843" y="949.85" width="141.732" height="192.512" />
<rect class="label-bg" x="1563.575" y="1128.362" width="38" height="14" />
<text class="z-index" x="1559.575" y="1138.362" text-anchor="end">z:219</text>
<text class="label label-inv" x="1597.575" y="1138.362">TEKST</text>
<rect class="text-frame" x="1459.843" y="1125.85" width="141.732" height="11" />
<rect class="label-bg" x="1557.575" y="1122.85" width="44" height="14" />
<text class="z-index" x="1553.575" y="1132.85" text-anchor="end">z:220</text>
<text class="label label-inv" x="1597.575" y="1132.85">AUTEUR</text>
<rect class="text-frame" x="1459.843" y="949.85" width="141.732" height="22" />
<rect class="label-bg" x="1563.575" y="957.85" width="38" height="14" />
<text class="z-index" x="1559.575" y="967.85" text-anchor="end">z:221</text>
<text class="label label-inv" x="1597.575" y="967.85">INTRO</text>
<rect class="text-frame" x="1459.843" y="872.85" width="141.732" height="11.427" />
<rect class="label-bg" x="1557.575" y="870.277" width="44" height="14" />
<text class="z-index" x="1553.575" y="880.277" text-anchor="end">z:222</text>
<text class="label label-inv" x="1597.575" y="880.277">PLAATS</text>
<rect class="text-frame" x="1459.843" y="894.85" width="141.732" height="55" />
<rect class="label-bg" x="1575.575" y="935.85" width="26" height="14" />
<text class="z-index" x="1571.575" y="945.85" text-anchor="end">z:223</text>
<text class="label label-inv" x="1597.575" y="945.85">KOP</text>
</g>
</svg>