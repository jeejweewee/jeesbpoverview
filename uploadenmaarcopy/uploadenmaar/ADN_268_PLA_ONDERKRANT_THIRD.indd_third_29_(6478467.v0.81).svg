<svg xmlns="http://www.w3.org/2000/svg" width="334.803" height="304" viewBox="16.85 852.85 334.803 304">
<style>
    .page { fill: #fff; stroke: #ccc; }
    .margin { fill: none; stroke: #aaa; stroke-dasharray: 4 2; }
    .column { fill: none; stroke: #ddd; }
    .grid { stroke: #eee; stroke-width: 0.5; }

    .text-frame { fill: rgba(0,0,255,0.08); stroke: #00f; }
    .image-frame { fill: rgba(255,165,0,0.15); stroke: #f90; }

    .frame-id { 
        font-size: 7px; 
        fill: #666;
    }
    
    .thread {
        fill: none;
        stroke: #888;
        stroke-dasharray: 3 3;
        stroke-width: 1;
    }

    .label {
        font-size: 9px;
        font-family: monospace;
    }

    .snippet {
        font-size: 12px;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        fill: #111;
    }

    .label-bg {
        fill: #000;
        opacity: 0.75;
    }

    .label-inv {
        fill: #fff;
        text-anchor: end;
    }

    .z-index { 
        font-size: 7px; 
        fill: #333;
        text-anchor: end;
        paint-order: stroke fill;
        stroke: white;
        stroke-width: 2;
        stroke-linejoin: round;
    }

    .distance {
        stroke: red;
        stroke-width: 2.5;
        fill: none;
    }

    .edge-ghost {
        stroke: rgba(200, 0, 0, 0.4);
        stroke-width: 1.5;
        stroke-dasharray: 6 3;
        fill: none;
    }

    .arrowhead {
        fill: red;
    }
    
    .fender-zone {
        fill: url(#fender-hatch);
        stroke: none;
    }

    .fender-edge {
        stroke: #0891b2;
        stroke-width: 2;
        fill: none;
    }
</style>
<defs>
    <pattern id="baseline-grid" patternUnits="userSpaceOnUse" width="100%" height="11">
        <line x1="0" y1="0" x2="100%" y2="0" class="grid" />
    </pattern>
    <pattern id="checkerboard" patternUnits="userSpaceOnUse" width="20" height="20">
        <rect width="20" height="20" fill="#e8e8e8" stroke="none"/>
        <rect width="10" height="10" fill="#ffffff" stroke="none"/>
        <rect x="10" y="10" width="10" height="10" fill="#ffffff" stroke="none"/>
    </pattern>
    <pattern id="fender-hatch" patternUnits="userSpaceOnUse" width="8" height="8" patternTransform="rotate(45)">
        <line x1="0" y1="0" x2="0" y2="8" stroke="#0891b2" stroke-width="1.2" stroke-opacity="0.5" />
    </pattern>
</defs>


<g id="article">

<rect class="text-frame" x="61.795" y="901.701" width="269.858" height="15.15" />
<rect class="label-bg" x="281.653" y="902.851" width="50" height="14" />
<text class="z-index" x="277.653" y="912.851" text-anchor="end">z:1</text>
<text class="label label-inv" x="327.653" y="912.851">SPECIAL</text>
<rect class="image-frame" x="36.85" y="916.85" width="294.803" height="176" />
<rect class="label-bg" x="293.653" y="1078.85" width="38" height="14" />
<text class="z-index" x="289.653" y="1088.85" text-anchor="end">z:2</text>
<text class="label label-inv" x="327.653" y="1088.85">image</text>
<rect class="text-frame" x="36.85" y="872.85" width="294.803" height="33" />
<rect class="label-bg" x="305.653" y="891.85" width="26" height="14" />
<text class="z-index" x="301.653" y="901.85" text-anchor="end">z:3</text>
<text class="label label-inv" x="327.653" y="901.85">KOP</text>
<rect class="text-frame" x="36.85" y="1092.85" width="294.803" height="44" />
<rect class="label-bg" x="293.653" y="1122.85" width="38" height="14" />
<text class="z-index" x="289.653" y="1132.85" text-anchor="end">z:4</text>
<text class="label label-inv" x="327.653" y="1132.85">TEKST</text>
</g>
</svg>