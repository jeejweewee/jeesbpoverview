<rect class="text-frame" x="36.85" y="135.85" width="294.803" height="88" />
<rect class="label-bg" x="305.653" y="209.85" width="26" height="14" />
<text class="z-index" x="301.653" y="219.85" text-anchor="end">z:3</text>
<text class="label label-inv" x="327.653" y="219.85">KOP</text>
<rect class="text-frame" x="36.85" y="234.85000000000002" width="141.732" height="275" />
<rect class="label-bg" x="140.582" y="495.85" width="38" height="14" />
<text class="z-index" x="136.582" y="505.85" text-anchor="end">z:4</text>
<text class="label label-inv" x="174.582" y="505.85">TEKST</text>
<rect class="text-frame" x="189.921" y="597.85" width="141.732" height="110" />
<rect class="label-bg" x="293.653" y="693.85" width="38" height="14" />
<text class="z-index" x="289.653" y="703.85" text-anchor="end">z:5</text>
<text class="label label-inv" x="327.653" y="703.85">QUOTE</text>
<rect class="text-frame" x="189.921" y="234.85000000000002" width="141.732" height="363" />
<rect class="label-bg" x="293.653" y="583.85" width="38" height="14" />
<text class="z-index" x="289.653" y="593.85" text-anchor="end">z:7</text>
<text class="label label-inv" x="327.653" y="593.85">TEKST</text>
</g>
</svg>